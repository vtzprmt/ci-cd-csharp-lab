name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest # Меняем Ubuntu на Windows, чтобы работал .NET Framework 4.7.2

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1 # Специальный экшен для старых проектов .NET

    - name: Navigate to Workspace
      run: cd $GITHUB_WORKSPACE

    - name: Restore Packages
      run: nuget restore CalculatorApp.sln # Восстанавливаем старые пакеты через NuGet

    - name: Build Solution
      run: msbuild CalculatorApp.sln /p:Configuration=Release # Собираем через MSBuild
